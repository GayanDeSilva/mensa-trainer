<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mensa Trainer for Kids</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Comic Neue', 'Segoe UI', sans-serif;
      background: #f0f7ff;
      margin: 0;
      padding: 20px;
      transition: background 0.3s;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 60px;
      padding: 30px 20px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #2c3e66;
      font-size: 2.2rem;
      margin: 0 0 10px;
    }
    .difficulty-badge {
      background: #ffcd3c;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .question-text {
      font-size: 2rem;
      background: #eef2ff;
      padding: 30px 20px;
      border-radius: 50px;
      margin: 20px 0;
      word-break: break-word;
    }
    .options-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
    }
    .option-btn, .number-input {
      background: #b6d0ff;
      border: none;
      font-size: 1.8rem;
      font-weight: bold;
      padding: 15px 25px;
      min-width: 100px;
      border-radius: 60px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      font-family: monospace;
      text-align: center;
    }
    .option-btn:active { transform: scale(0.96); background: #8faeec; }
    .number-input {
      background: white;
      border: 3px solid #b6d0ff;
      width: 150px;
      font-size: 1.8rem;
      text-align: center;
    }
    .submit-btn {
      background: #2c6e2c;
      color: white;
      font-size: 1.7rem;
      padding: 12px 35px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 10px;
    }
    .feedback {
      font-size: 1.6rem;
      margin-top: 20px;
      padding: 12px;
      border-radius: 40px;
    }
    .next-btn {
      background: #ff8c42;
      color: white;
      font-size: 1.6rem;
      padding: 12px 30px;
      margin-top: 15px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
    .stats-link {
      margin-top: 30px;
      font-size: 0.9rem;
      color: gray;
    }
    @media (max-width: 550px) {
      .question-text { font-size: 1.5rem; }
      .option-btn { font-size: 1.4rem; padding: 10px 18px; min-width: 70px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🧠 Brain Gym</h1>
  <div class="difficulty-badge" id="difficultyBadge">⭐ Difficulty 1</div>
  <div class="question-text" id="questionText">Loading...</div>
  <div id="answerArea"></div>
  <div id="feedback" class="feedback"></div>
  <button id="nextButton" class="next-btn" style="display:none;">➡ Next Puzzle</button>
  <div class="stats-link">👨‍👩 Parent: <a href="stats.html" target="_blank">View Statistics</a></div>
</div>

<script>
  // ----- GLOBALS -----
  let exercises = [];
  let currentIndex = 0;
  let currentQuestion = null;
  let waitingForNext = false;

  // ----- LOAD EXERCISES FROM JSON FILE -----
  async function loadExercises() {
    try {
      const response = await fetch('exercises.json?t=' + Date.now()); // cache buster
      const data = await response.json();
      exercises = data.exercises;
      if (!exercises.length) throw new Error("No exercises found");
      currentIndex = 0;
      showQuestion();
    } catch (err) {
      document.getElementById('questionText').innerText = "⚠️ No exercises found. Ask parent to add exercises.json file.";
      console.error(err);
    }
  }

  // ----- DISPLAY CURRENT QUESTION -----
  function showQuestion() {
    waitingForNext = false;
    document.getElementById('nextButton').style.display = 'none';
    document.getElementById('feedback').innerHTML = '';
    const q = exercises[currentIndex];
    if (!q) {
      document.getElementById('questionText').innerText = "🎉 You finished all puzzles! Well done! 🎉";
      document.getElementById('answerArea').innerHTML = '';
      return;
    }
    currentQuestion = q;
    document.getElementById('questionText').innerHTML = q.questionText;
    document.getElementById('difficultyBadge').innerHTML = `⭐ Difficulty ${q.difficulty}  •  ${getTypeEmoji(q.type)} ${q.type}`;
    
    // build answer area based on answerType
    const answerDiv = document.getElementById('answerArea');
    answerDiv.innerHTML = '';
    if (q.answerType === 'multiple-choice' && q.options && q.options.length) {
      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'options-area';
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => submitAnswer(opt);
        optionsDiv.appendChild(btn);
      });
      answerDiv.appendChild(optionsDiv);
    } 
    else { // number-input or default
      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'number-input';
      input.placeholder = '?';
      input.id = 'userNumberInput';
      const submitBtn = document.createElement('button');
      submitBtn.innerText = '✓ Check';
      submitBtn.className = 'submit-btn';
      submitBtn.onclick = () => {
        const val = parseInt(document.getElementById('userNumberInput').value);
        if (isNaN(val)) {
          showFeedback("🔢 Type a number first!", "#ffb3b3");
          return;
        }
        submitAnswer(val);
      };
      answerDiv.appendChild(input);
      answerDiv.appendChild(submitBtn);
    }
  }

  function getTypeEmoji(type) {
    if (type.includes('number')) return '🔢';
    if (type.includes('pattern')) return '🌀';
    if (type.includes('logic')) return '🧩';
    return '📚';
  }

  function showFeedback(msg, bgColor) {
    const fb = document.getElementById('feedback');
    fb.innerText = msg;
    fb.style.backgroundColor = bgColor;
    fb.style.padding = '10px';
    fb.style.borderRadius = '50px';
  }

  // ----- RECORD ANSWER & STATS -----
  function submitAnswer(userAnswer) {
    if (waitingForNext) {
      showFeedback("✅ Already answered! Press Next.", "#ffe0b3");
      return;
    }
    const q = currentQuestion;
    const isCorrect = (userAnswer == q.correctAnswer);
    
    // Record attempt in localStorage
    const record = {
      id: q.id,
      type: q.type,
      difficulty: q.difficulty,
      correct: isCorrect,
      userAnswer: userAnswer,
      correctAnswer: q.correctAnswer,
      timestamp: new Date().toISOString()
    };
    let stats = JSON.parse(localStorage.getItem('mensa_stats')) || [];
    stats.push(record);
    localStorage.setItem('mensa_stats', JSON.stringify(stats));
    
    // Show feedback
    if (isCorrect) {
      showFeedback("✔️ Correct! Great job! 🎉", "#c8f0d1");
    } else {
      showFeedback(`❌ Oops! Correct answer is ${q.correctAnswer}. Keep trying!`, "#ffc9c9");
    }
    
    waitingForNext = true;
    document.getElementById('nextButton').style.display = 'inline-block';
    // disable answer inputs (optional)
    const btns = document.querySelectorAll('.option-btn, .submit-btn');
    btns.forEach(btn => btn.disabled = true);
    const numInput = document.getElementById('userNumberInput');
    if (numInput) numInput.disabled = true;
  }

  // ----- Next question -----
  function nextQuestion() {
    if (!waitingForNext && currentQuestion) {
      showFeedback("👂 Please answer the current question first!", "#ffe0b3");
      return;
    }
    currentIndex++;
    if (currentIndex >= exercises.length) {
      // loop or finish: you can reset to 0 or show finish
      document.getElementById('questionText').innerText = "🏆 Amazing! You finished all puzzles. 🏆";
      document.getElementById('answerArea').innerHTML = '';
      document.getElementById('nextButton').style.display = 'none';
      document.getElementById('feedback').innerHTML = '<span>⭐ Come back tomorrow for new puzzles! ⭐</span>';
      return;
    }
    showQuestion();
  }

  // attach event listener
  document.getElementById('nextButton').addEventListener('click', nextQuestion);
  
  // start
  loadExercises();
</script>
</body>
</html>
